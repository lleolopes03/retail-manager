<div class="empresa-container">
  <mat-card>
    <h2 class="title">Cadastro de Empresa</h2>
    <form [formGroup]="empresaForm" (ngSubmit)="onSubmit()">

      <!-- Dados principais -->
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>CNPJ</mat-label>
        <input matInput formControlName="cnpj" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="telefone" />
      </mat-form-field>

      <!-- Endereço -->
      <h3>Endereço</h3>
      <div formGroupName="endereco">
        <mat-form-field class="full-width" appearance="outline">
          <mat-label>CEP</mat-label>
          <input matInput formControlName="cep" (blur)="buscarCep()" />
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Logradouro</mat-label>
          <input matInput formControlName="logradouro" />
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Bairro</mat-label>
          <input matInput formControlName="bairro" />
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Cidade</mat-label>
          <input matInput formControlName="localidade" />
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Estado</mat-label>
          <input matInput formControlName="uf" />
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Número</mat-label>
          <input matInput type="number" formControlName="numero" />
        </mat-form-field>
      </div>

      <!-- Botão -->
      <button mat-raised-button color="primary" class="full-width" type="submit">
               {{ empresaId ? 'Atualizar' : 'Cadastrar' }}
      </button>
      <button mat-raised-button color="accent" class="full-width" type="button" (click)="voltar()">
           Voltar
      </button>
    </form>
  </mat-card>
</div>
