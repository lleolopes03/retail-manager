<div class="cliente-container">
  <mat-card>
    <h2 class="title">
      {{ modoEdicao ? 'Editar Cliente' : 'Cadastro de Cliente' }}
    </h2>

    <form [formGroup]="clienteForm" (ngSubmit)="onSubmit()">
      <!-- Dados pessoais -->
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Data de Nascimento</mat-label>
        <input matInput type="date" formControlName="dataNascimento" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>CPF</mat-label>
        <input matInput formControlName="cpf" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="telefone" />
      </mat-form-field>

      <!-- Endereço -->
      <h3>Endereço</h3>
<div formGroupName="endereco">
  <mat-form-field class="full-width" appearance="outline">
    <mat-label>CEP</mat-label>
    <input matInput formControlName="cep" (blur)="buscarCep()" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Rua</mat-label> <!-- label amigável -->
    <input matInput formControlName="logradouro" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Complemento</mat-label>
    <input matInput formControlName="complemento" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Bairro</mat-label>
    <input matInput formControlName="bairro" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Cidade</mat-label> <!-- label amigável -->
    <input matInput formControlName="localidade" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Estado</mat-label> <!-- label amigável -->
    <input matInput formControlName="uf" />
  </mat-form-field>
</div>
      <!-- Botão -->
      <button mat-raised-button color="primary" class="full-width" type="submit">
        {{ modoEdicao ? 'Atualizar' : 'Cadastrar' }}
      </button>
      <button mat-raised-button color="accent" class="full-width" type="button" (click)="voltar()">
           Voltar
      </button>

    </form>
  </mat-card>

</div>
