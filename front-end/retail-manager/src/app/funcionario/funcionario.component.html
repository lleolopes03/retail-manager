<div class="funcionario-container">
  <mat-card>
    <h2 class="title">
      {{ modoEdicao ? 'Editar Funcionário' : 'Cadastro de Funcionário' }}
    </h2>

    <form [formGroup]="funcionarioForm" (ngSubmit)="onSubmit()">
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>CPF</mat-label>
        <input matInput formControlName="cpf" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="telefone" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Data de Contratação</mat-label>
        <input matInput type="date" formControlName="dataContratacao" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Salário</mat-label>
        <input matInput type="number" formControlName="salario" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Cargo</mat-label>
        <mat-select formControlName="cargo">
          <mat-option *ngFor="let c of cargos" [value]="c">{{ c }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Login</mat-label>
        <input matInput formControlName="login" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Senha</mat-label>
        <input matInput type="password" formControlName="senha" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Perfil</mat-label>
        <mat-select formControlName="perfil">
          <mat-option *ngFor="let p of perfis" [value]="p">{{ p }}</mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-raised-button color="primary" class="full-width" type="submit">
        {{ modoEdicao ? 'Atualizar' : 'Cadastrar' }}
      </button>
      <button mat-raised-button color="accent" class="full-width" type="button" (click)="voltar()">
           Voltar
      </button>
    </form>
  </mat-card>
</div>
