<div class="login-container">
  <div class="login-card-wrapper">
    <mat-card class="login-card">
      <!-- Logo -->
      <div class="logo-container">
        <img src="/logo.jpg" alt="Logo Isabela Modas" class="logo" />
      </div>

      <!-- Título centralizado -->
      <h2 class="login-title">Bem-vindo de volta</h2>
      <p class="login-subtitle">Entre com suas credenciais</p>

      <!-- Formulário -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuário</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input matInput formControlName="login" autocomplete="username" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput type="password" formControlName="senha" autocomplete="current-password" />
        </mat-form-field>

        <button mat-raised-button class="btn-primary login-button" type="submit" [disabled]="loginForm.invalid">
          Entrar
        </button>
      </form>

      <!-- Rodapé -->
      <div class="login-footer">
        <p>&copy; 2026 Isabela Modas - Sistema de Gestão</p>
      </div>
    </mat-card>
  </div>
</div>
