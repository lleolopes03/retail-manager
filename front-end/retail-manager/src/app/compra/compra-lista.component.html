<div class="compras-container">
  <h2>Compras</h2>

  <div class="actions">
    <button mat-raised-button color="primary" routerLink="/compras/novo">
      Nova Compra
    </button>
    <button mat-raised-button color="accent" routerLink="/dashboard">
      Voltar ao Dashboard
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 full-width">
    <!-- Data -->
    <ng-container matColumnDef="dataCompra">
      <th mat-header-cell *matHeaderCellDef> Data </th>
      <td mat-cell *matCellDef="let c"> {{ c.dataCompra | date:'shortDate' }} </td>
    </ng-container>

    <!-- Fornecedor -->
    <ng-container matColumnDef="fornecedor">
      <th mat-header-cell *matHeaderCellDef> Fornecedor </th>
      <td mat-cell *matCellDef="let c"> {{ c.fornecedor?.nome }} </td>
    </ng-container>

    <!-- Valor Total -->
    <ng-container matColumnDef="valorTotal">
      <th mat-header-cell *matHeaderCellDef> Valor Total </th>
      <td mat-cell *matCellDef="let c"> {{ c.valorTotal | currency:'BRL' }} </td>
    </ng-container>

    <!-- Ações -->
    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let c">
        <button mat-button color="accent" [routerLink]="['/compras', c.id, 'editar']">Editar</button>
        <button mat-button color="warn" (click)="deletar(c.id)">Excluir</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
