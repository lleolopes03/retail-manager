<div class="fornecedor-container">
  <mat-card>
    <h2 class="title">
      {{ modoEdicao ? 'Editar Fornecedor' : 'Cadastro de Fornecedor' }}
    </h2>

    <form [formGroup]="fornecedorForm" (ngSubmit)="onSubmit()">
      <!-- Dados principais -->
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>CNPJ</mat-label>
        <input matInput formControlName="cnpj" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="telefone" />
      </mat-form-field>

      <!-- Endereço -->
     <h3>Endereço</h3>
<div formGroupName="endereco">
  <mat-form-field class="full-width" appearance="outline">
    <mat-label>CEP</mat-label>
    <input matInput formControlName="cep" (blur)="buscarCep()" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Logradouro</mat-label>
    <input matInput formControlName="logradouro" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Complemento</mat-label>
    <input matInput formControlName="complemento" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Bairro</mat-label>
    <input matInput formControlName="bairro" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>Localidade</mat-label>
    <input matInput formControlName="localidade" />
  </mat-form-field>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label>UF</mat-label>
    <input matInput formControlName="uf" />
  </mat-form-field>
</div>

      <!-- Botão -->
      <button mat-raised-button color="primary" class="full-width" type="submit">
        {{ modoEdicao ? 'Atualizar' : 'Cadastrar' }}
      </button>
      <button mat-raised-button color="accent" class="full-width" type="button" (click)="voltar()">
           Voltar
      </button>
    </form>
  </mat-card>
</div>
